<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pickle@chirag</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Add your existing CSS styles from the previous message here */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

  <main class="p-4 max-w-xl mx-auto w-full">
    <div id="viewLoginPanel">...</div>
    <div id="viewWorkspacePanel" class="hidden">...</div>
  </main>

  <script>
    const BACKEND_WEBAPP_URL = "/api/gateway"; // Using your Proxy Server
    
    // ... [Insert all your JS functions: executeMemberLoginHandshake, syncUserLogsAndMatrix, 
    // renderUserMatrixGridUI, renderUserPersonalLedgerUI, renderGlobalClubTimelineUI, 
    // commitSecureMemberBooking, etc. from the previous response] ...

    // IMPORTANT: Ensure syncUserLogsAndMatrix calls both render functions
    function syncUserLogsAndMatrix() {
        if(!secureUserSessionToken) return;
        fetch(BACKEND_WEBAPP_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "getAvailability", sessionToken: secureUserSessionToken, date: selectedUserDateStr })
        })
        .then(r => r.json()).then(res => {
            if(res.success) {
                matrixAvailabilityRecords = res.availability || [];
                renderUserMatrixGridUI();      // Updates the frozen slots
                renderGlobalClubTimelineUI();  // Updates the global upcoming feed
            }
        });
        
        fetch(BACKEND_WEBAPP_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "getMyBookings", sessionToken: secureUserSessionToken })
        })
        .then(r => r.json()).then(res => {
            if(res.success) {
                personalLedgerBookings = res.bookings || [];
                renderUserPersonalLedgerUI();   // Updates the personal ledger
            }
        });
    }
  </script>
</body>
</html>
