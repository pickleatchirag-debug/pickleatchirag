<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pickle@chirag</title>
  
  <link rel="manifest" href="/manifest.json?v=6.0.0">
  <meta name="theme-color" content="#020617">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link class="app-main-icon-src" rel="apple-touch-icon" href="/icon-192.png?v=6.0.0">

  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: #ef4444; }

    /* Static Boot Overlay Panel */
    #appFirstBootSplashScreen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, #083344 0%, #020617 80%);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease-out;
    }

    .splash-logo-main {
      width: 240px;
      height: 240px;
      position: relative;
      z-index: 2;

      filter:
        drop-shadow(0 0 30px rgba(34,211,238,.25))
        drop-shadow(0 0 60px rgba(34,211,238,.15));

      animation: splashFloat 2.5s ease-in-out infinite;
    }

    .splash-logo-glow {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 9999px;

      background:
        radial-gradient(
          circle,
          rgba(34,211,238,.35) 0%,
          rgba(34,211,238,.12) 40%,
          transparent 75%
        );

      filter: blur(30px);
    }

    @keyframes splashFloat {
      0%   { transform: translateY(0); }
      50%  { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }
  </style>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js?v=6.0.0")
          .then(reg => {
            console.log("✓ Mobile App Engine Active.");
            reg.update();
          })
          .catch(err => console.log("× Service Engine Error: ", err));
      });
    }
  </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans select-none flex flex-col justify-between pb-6">

  <div id="appFirstBootSplashScreen">
    <div class="relative flex flex-col items-center">

      <div class="splash-logo-glow"></div>

      <img
        src="/icon-512.png?v=6.0.0"
        alt="Pickle At Chirag"
        class="splash-logo-main"
      >

    </div>
  </div>

  <div class="bg-slate-900 border-b border-slate-800 text-xs py-2 px-4 shadow-md">
    <div class="max-w-xl mx-auto flex items-center space-x-2 overflow-hidden">
      <span class="bg-red-500/10 text-red-400 border border-red-500/20 px-2 py-0.5 rounded font-black uppercase text-[9px] tracking-wider shrink-0 animate-pulse">Notice</span>
      <marquee id="systemGlobalTicker" class="text-slate-300 font-medium">Welcome to the Portal Desk.</marquee>
    </div>
  </div>

  <div id="pwaGlobalInstallBanner" class="hidden max-w-md w-full mx-auto px-4 mt-4 select-none">
    <div class="bg-gradient-to-r from-cyan-950/40 to-slate-900 border border-cyan-500/30 rounded-2xl p-4 flex items-center justify-between shadow-xl">
      <div class="flex items-center space-x-3">
        <div class="text-xl bg-cyan-500/10 border border-cyan-500/20 p-2 rounded-xl text-center">📱</div>
        <div>
          <h4 class="text-xs font-black text-slate-100 uppercase tracking-wider">Install App Icon</h4>
          <p id="pwaBannerInstructionText" class="text-[10px] text-slate-400 mt-0.5 font-medium">Install pickle@chirag for quick access to court reservations.</p>
        </div>
      </div>
      <button id="pwaActionTriggerBtn" class="bg-cyan-500 text-slate-950 text-[10px] font-black px-4 py-2.5 rounded-xl uppercase tracking-widest hover:brightness-110 shadow-lg active:scale-[0.97] transition-all cursor-pointer">Install</button>
    </div>
  </div>

  <main class="p-4 max-w-xl mx-auto w-full flex-1 flex flex-col justify-center">
    
    <div id="viewLoginPanel" class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-2xl max-w-md w-full mx-auto">
      <div class="text-center space-y-1 mb-4">
        <h2 class="text-xs font-black tracking-widest uppercase text-red-500">Welcome Back</h2>
        <p class="text-xl font-black text-slate-100 tracking-tight">pickle@chirag</p>
      </div>
      
      <form id="coreLoginFormHub" onsubmit="event.preventDefault(); executeMemberLoginHandshake();" class="space-y-4">
        <div class="space-y-1">
          <label class="text-[10px] font-black uppercase text-slate-400 tracking-wider block">Google Email Address</label>
          <input type="email" id="loginEmailField" name="username" autocomplete="username" placeholder="name@gmail.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-red-500 text-slate-100 placeholder-slate-600 font-mono">
        </div>
        <div class="space-y-1">
          <label class="text-[10px] font-black uppercase text-slate-400 tracking-wider block">Personal Password Key</label>
          <input type="password" id="loginPasswordField" name="password" autocomplete="current-password" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-red-500 text-slate-100 placeholder-slate-700 tracking-widest">
        </div>
        <button type="submit" class="w-full bg-gradient-to-r from-red-500 to-amber-500 text-slate-950 font-black py-3.5 rounded-xl text-xs uppercase tracking-widest shadow-lg hover:brightness-110 active:scale-[0.99] transition-all cursor-pointer pt-2">
          Sign Into Dashboard
        </button>
      </form>
    </div>

    <div id="viewWorkspacePanel" class="hidden space-y-6">
      <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex justify-between items-center shadow-lg">
         <div class="flex items-center space-x-3">
            <div class="text-2xl bg-red-500/10 border border-red-500/20 p-2 rounded-xl text-center">🏆</div>
            <div>
               <h3 id="lblWorkspaceMemberName" class="text-sm font-black text-slate-100">--</h3>
               <p id="lblWorkspaceMemberEmail" class="text-[10px] text-slate-400 font-mono tracking-wide mt-0.5">--</p>
            </div>
         </div>
         <div class="text-right">
            <span class="text-[9px] uppercase font-black text-slate-400 tracking-wider block">Available Tokens</span>
            <span id="lblWorkspaceAvailableTokens" class="text-lg font-black text-amber-400 font-mono">0</span>
         </div>
      </div>

      <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-lg space-y-3">
         <div class="flex justify-between items-center overflow-x-auto gap-2 py-0.5" id="userCalendarStrip"></div>
         <div class="grid grid-cols-3 gap-2 bg-slate-950 p-1 rounded-xl border border-slate-900 text-xs font-bold text-center">
           <button id="userBtnC1" onclick="switchUserCourtAsset('Pickleball Court 1')" class="bg-slate-900 text-red-400 p-2 rounded-lg border border-slate-800 font-bold">PB Court 1</button>
           <button id="userBtnC2" onclick="switchUserCourtAsset('Pickleball Court 2')" class="text-slate-500 p-2 rounded-lg font-bold">PB Court 2</button>
           <button id="userBtnC3" onclick="switchUserCourtAsset('Badminton Court 1')" class="text-slate-500 p-2 rounded-lg font-bold">BD Court 1</button>
         </div>
      </div>

      <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-lg space-y-3">
         <div class="flex justify-between items-center border-b border-slate-800 pb-1.5">
            <span class="text-xs font-black uppercase text-slate-400">Select Booking Time Frame</span>
            <span id="lblUserAssetHeadline" class="text-[10px] font-black uppercase text-red-400 tracking-wider">Pickleball Court 1</span>
         </div>
         <div id="userTimeSlotMatrixGrid" class="grid grid-cols-2 gap-2.5 max-h-[260px] overflow-y-auto pr-1"></div>
         <div class="pt-2">
            <button onclick="commitSecureMemberBooking()" class="w-full bg-gradient-to-r from-red-500 to-amber-500 text-slate-950 font-black py-4 rounded-xl text-xs uppercase tracking-widest shadow-xl hover:brightness-110 active:scale-[0.99] transition-all cursor-pointer">
               Lock Booking Reservation Frame
            </button>
         </div>
      </div>

      <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-lg space-y-4">
        <div class="flex justify-between items-center border-b border-slate-800 pb-2">
          <h2 class="text-xs font-black tracking-wider uppercase text-slate-300">Your Booking Ledger</h2>
          <div class="flex space-x-3 text-[10px] font-black uppercase tracking-wider">
            <button id="tabUserLogUpcoming" onclick="toggleUserLogTab('upcoming')" class="text-emerald-400 underline decoration-2 underline-offset-4 font-black cursor-pointer">Upcoming Matches</button>
            <button id="tabUserLogPast" onclick="toggleUserLogTab('past')" class="text-slate-500 cursor-pointer">History Log</button>
          </div>
        </div>
        <div id="userPersonalLedgerContainer" class="max-h-[240px] overflow-y-auto space-y-2.5 pr-1"></div>
      </div>

      <div class="text-center">
         <button onclick="executeLogoutSequence()" class="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-red-400 transition-all border border-slate-800/80 px-4 py-2 rounded-xl bg-slate-900/40">✕ Terminate Session Authorization</button>
      </div>
    </div>
  </main>

  <footer class="text-center text-[10px] text-slate-600 font-medium tracking-wide">
    pickle@chirag • Court Reservation System
  </footer>

  <script>
    const BACKEND_WEBAPP_URL = "https://script.google.com/macros/s/AKfycby_elXprUxfCPl1WYiPx2gc6TWpohNY-osHhfGgxeZBacn1vimm433n7sHUx2AvuVvHtg/exec";

    const TIME_SLOTS = [
      "07:00-08:00", "08:00-09:00", "09:00-10:00", "10:00-11:00", 
      "11:00-12:00", "12:00-13:00", "13:00-14:00", "14:00-15:00", 
      "15:00-16:00", "16:00-17:00", "17:00-18:00", "18:00-19:00", 
      "19:00-20:00", "20:00-21:00"
    ];

    let selectedUserAsset = "Pickleball Court 1";
    let selectedUserDateStr = ""; 
    let matrixAvailabilityRecords = [];
    let personalLedgerBookings = [];
    let sessionMemberProfile = null;
    let secureUserSessionToken = "";
    let selectedTentativeSlotMemory = "";
    let activeUserLogTab = "upcoming";
    let deferredPromptInstance = null;
    let syncInterval = null;

    function evaluateStorageSessionSync() {
      const savedToken = localStorage.getItem('chirag_session_token');
      const savedProfile = localStorage.getItem('chirag_member_profile');

      if (savedToken && savedProfile) {
        try {
          secureUserSessionToken = savedToken;
          sessionMemberProfile = JSON.parse(savedProfile);
          
          window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('lblWorkspaceMemberName').innerText = sessionMemberProfile.full_name;
            document.getElementById('lblWorkspaceMemberEmail').innerText = sessionMemberProfile.email;
            
            toggleInterfaceView('workspace');
            initUserCalendarStrip();
            startPollingLiveWorkspaceLogs();
          });
          return true;
        } catch (e) {
          localStorage.removeItem('chirag_session_token');
          localStorage.removeItem('chirag_member_profile');
        }
      }
      return false;
    }

    const isUserAuthenticated = evaluateStorageSessionSync();

    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            const splash = document.getElementById('appFirstBootSplashScreen');
            if (splash) {
                splash.style.opacity = '0';
                setTimeout(() => splash.remove(), 500);
            }
        }, 1000);
        
        initiateSmartPwaBannerSystem();

        if (!isUserAuthenticated) {
            toggleInterfaceView('login');
        }
    });

    function toggleInterfaceView(targetView) {
        const panels = {
            'login': document.getElementById('viewLoginPanel'),
            'workspace': document.getElementById('viewWorkspacePanel')
        };
        const bannerEl = document.getElementById('pwaGlobalInstallBanner');

        Object.values(panels).forEach(panel => {
            if (panel) {
                panel.classList.add('hidden');
                panel.style.display = 'none'; 
            }
        });

        const currentTarget = panels[targetView];
        if (currentTarget) {
            currentTarget.classList.remove('hidden');
            currentTarget.style.display = 'block';
            
            if (targetView === 'workspace' && bannerEl) {
                bannerEl.classList.add('hidden');
                bannerEl.style.display = 'none';
            }
        }
    }

    function initiateSmartPwaBannerSystem() {
        const banner = document.getElementById('pwaGlobalInstallBanner');
        const txt = document.getElementById('pwaBannerInstructionText');
        const btn = document.getElementById('pwaActionTriggerBtn');
        const isIosDevice = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        const isStandaloneActive = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;

        if (isStandaloneActive || !banner) return;

        if (isIosDevice) {
            banner.classList.remove('hidden');
            txt.innerText = "Tap Safari's 'Share' button at the bottom navigation panel, then tap 'Add to Home Screen'.";
            btn.innerText = "Guide";
            btn.onclick = () => alert("🍏 Apple Setup Guide:\n1. Click the share arrow at the bottom of Safari.\n2. Choose 'Add to Home Screen' from the card menu.");
        } else {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPromptInstance = e;
                banner.classList.remove('hidden');
            });
            btn.onclick = () => {
                if (!deferredPromptInstance) return;
                deferredPromptInstance.prompt();
                deferredPromptInstance.userChoice.then((choice) => {
                    if (choice.outcome === 'accepted') banner.classList.add('hidden');
                    deferredPromptInstance = null;
                });
            };
        }
    }

    function getNowLocalIST() { 
      return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Kolkata" })); 
    }

    function parseUIDateToAbsoluteObject(dateStr, timeSlotStr) {
        try {
            const [y, m, d] = dateStr.split('-');
            const startHourStr = timeSlotStr.split('-')[0].trim();
            const [hour, minutes] = startHourStr.split(':');
            return new Date(parseInt(y, 10), parseInt(m, 10) - 1, parseInt(d, 10), parseInt(hour, 10), parseInt(minutes || 0, 10), 0);
        } catch(e) { return new Date(); }
    }

    function executeMemberLoginHandshake() {
        const email = document.getElementById('loginEmailField').value.trim();
        const password = document.getElementById('loginPasswordField').value.trim();

        if(!email || !password) return alert("Please specify login email and password keys.");

        fetch(BACKEND_WEBAPP_URL, {
            method: 'POST',
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ action: "memberLogin", email: email, password: password })
        })
        .then(r => r.json()).then(res => {
            if(res.success === false || res.success === "false") return alert(res.message || "Invalid credentials");
            
            secureUserSessionToken = res.token;
            sessionMemberProfile = {
              full_name: res.full_name,
              email: res.email
            };

            localStorage.setItem('chirag_session_token', secureUserSessionToken);
            localStorage.setItem('chirag_member_profile', JSON.stringify(sessionMemberProfile));

            document.getElementById('lblWorkspaceMemberName').innerText = sessionMemberProfile.full_name;
            document.getElementById('lblWorkspaceMemberEmail').innerText = sessionMemberProfile.email;
            document.getElementById('lblWorkspaceAvailableTokens').innerText = res.custom_tokens;

            toggleInterfaceView('workspace');
            initUserCalendarStrip();
            startPollingLiveWorkspaceLogs();
        })
        .catch(() => alert("Authorization channel offline. Verify WebApp URL configurations."));
    }

    function startPollingLiveWorkspaceLogs() {
        syncUserLogsAndMatrix();
        
        if (syncInterval) {
          clearInterval(syncInterval);
        }

        syncInterval = setInterval(syncUserLogsAndMatrix, 8000);
    }

    function syncUserLogsAndMatrix() {
        if(!secureUserSessionToken) return;
        
        // 1. Fetch live time slot openings matching the calendar strip choice
        fetch(BACKEND_WEBAPP_URL, {
            method: 'POST',
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ action: "getAvailability", sessionToken: secureUserSessionToken, date: selectedUserDateStr })
        })
        .then(r => r.json()).then(res => {
            if(res.success) {
                matrixAvailabilityRecords = res.availability || [];
                renderUserMatrixGridUI();
            }
        }).catch(e => console.log("Availability sync exception caught: ", e));

        // 2. Fetch logged records associated with active token
        fetch(BACKEND_WEBAPP_URL, {
            method: 'POST',
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ action: "getMyBookings", sessionToken: secureUserSessionToken })
        })
        .then(r => r.json()).then(res => {
            if(res.success) {
                document.getElementById('lblWorkspaceAvailableTokens').innerText = res.member.tokens;
                personalLedgerBookings = res.bookings || [];
                renderUserPersonalLedgerUI();
            }
        }).catch(e => console.log("Ledger sync exception caught: ", e));
    }

    function initUserCalendarStrip() {
        const box = document.getElementById('userCalendarStrip'); if(!box) return;
        const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]; const nowIST = getNowLocalIST();
        box.innerHTML = "";

        let dates = [];
        for(let i=0; i<3; i++) {
           let d = new Date(nowIST.getTime()); d.setDate(nowIST.getDate() + i);
           let formatStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
           dates.push(formatStr);
           
           if(i === 0 && !selectedUserDateStr) selectedUserDateStr = dates[0];
           
           let isSel = selectedUserDateStr === dates[i];
           box.innerHTML += `
             <div onclick="switchUserDateAsset('${dates[i]}')" class="border text-center flex-1 p-2 rounded-xl cursor-pointer transition-all ${isSel?'border-red-500 bg-red-950/20 text-red-400 font-bold':'border-slate-800 bg-slate-900 text-slate-400'}">
                <p class="text-[9px] uppercase font-black">${days[d.getDay()]}</p>
                <p class="text-sm font-black text-slate-200 mt-0.5">${String(d.getDate()).padStart(2,'0')}</p>
             </div>`;
        }
    }

    function switchUserDateAsset(dateStr) { 
        selectedUserDateStr = dateStr; 
        selectedTentativeSlotMemory = ""; 
        initUserCalendarStrip(); 
        syncUserLogsAndMatrix(); 
    }
    
    function switchUserCourtAsset(courtName) {
        selectedUserAsset = courtName; selectedTentativeSlotMemory = "";
        document.getElementById('lblUserAssetHeadline').innerText = courtName;
        ['userBtnC1','userBtnC2','userBtnC3'].forEach(id => document.getElementById(id).className="text-slate-500 p-2 rounded-lg font-bold");
        const activeId = courtName.includes('1') ? (courtName.includes('Pickleball')?'userBtnC1':'userBtnC3') : 'userBtnC2';
        document.getElementById(activeId).className="bg-slate-950 text-red-400 p-2 rounded-lg border border-slate-800 font-bold";
        syncUserLogsAndMatrix();
    }

    function renderUserMatrixGridUI() {
        const grid = document.getElementById('userTimeSlotMatrixGrid'); if(!grid) return;
        const nowIST = getNowLocalIST();
        
        // Filter out records from sheet matrix matching the chosen day + court asset layout target
        const activeFilteredLogs = matrixAvailabilityRecords.filter(l => l.court.trim() === selectedUserAsset.trim());

        let newHTML = "";
        TIME_SLOTS.forEach(slot => {
            const rowMatch = activeFilteredLogs.find(l => l.slot.trim() === slot.trim());
            const isPast = nowIST >= parseUIDateToAbsoluteObject(selectedUserDateStr, slot);
            
            let cardStyle = "bg-slate-950 border-slate-900 text-slate-300 hover:border-slate-800 cursor-pointer";
            let stateLabel = "Available Slot"; 
            let action = `onclick="selectTentativeUserSlot('${slot}')"`;

            if(isPast) {
                cardStyle = "bg-slate-900/10 border-slate-950 text-slate-700 line-through cursor-not-allowed";
                stateLabel = "Expired Slot"; action = "";
            } else if(rowMatch && rowMatch.status === "BOOKED") {
                // Check local user historical buffer to see if they own this structural row item
                let myOwnMatch = personalLedgerBookings.find(b => b.court === selectedUserAsset && b.date === selectedUserDateStr && b.slot === slot && b.status === "ACTIVE");
                
                cardStyle = myOwnMatch ? "bg-red-950/20 border-red-500 text-red-400 font-bold" : "bg-slate-900 border-slate-800 text-slate-500 cursor-not-allowed";
                stateLabel = myOwnMatch ? "Your Session" : "Unavailable";
                action = myOwnMatch ? `onclick="forceUserSelfRelease('${myOwnMatch.bookingId}')"` : "";
            } else if(selectedTentativeSlotMemory === slot) {
                cardStyle = "border-amber-400 bg-amber-950/10 text-amber-400 font-bold shadow-md";
                stateLabel = "Selected Target Block";
            }

            newHTML += `<div ${action} class="border p-3 rounded-xl text-center select-none transition-all ${cardStyle}"><span class="text-xs font-mono font-bold block">${slot}</span><span class="text-[9px] uppercase font-black mt-0.5 tracking-wide block">${stateLabel}</span></div>`;
        });
        grid.innerHTML = newHTML;
    }

    function selectTentativeUserSlot(slotStr) { selectedTentativeSlotMemory = slotStr; renderUserMatrixGridUI(); }

    function renderUserPersonalLedgerUI() {
        const container = document.getElementById('userPersonalLedgerContainer'); if(!container) return;
        container.innerHTML = ""; const nowIST = getNowLocalIST();

        let myParsedLogs = personalLedgerBookings.map(b => { 
           return { ...b, parsedTime: parseUIDateToAbsoluteObject(b.date, b.slot) }; 
        });

        let targetedRows = myParsedLogs.filter(b => {
            if (b.status === "CANCELLED") return false;
            return activeUserLogTab === "upcoming" ? b.parsedTime > nowIST && b.status === "ACTIVE" : b.parsedTime <= nowIST || b.status === "COMPLETED";
        });

        if (targetedRows.length === 0) {
            container.innerHTML = `<p class="text-xs text-slate-500 text-center py-4">No records found matching this ledger view.</p>`;
            return;
        }

        targetedRows.forEach(b => {
            let actionBtn = (activeUserLogTab === "upcoming" && b.status === "ACTIVE") 
                ? `<button onclick="forceUserSelfRelease('${b.bookingId}')" class="text-[10px] bg-red-950/40 text-red-400 border border-red-900/40 px-2.5 py-1.5 rounded-lg font-black uppercase hover:bg-red-500 hover:text-slate-950 transition-all cursor-pointer">Cancel</button>` 
                : `<span class="text-[9px] bg-slate-950 text-slate-500 border border-slate-900 px-2 py-1 rounded font-black uppercase tracking-wide">${b.status}</span>`;

            container.innerHTML += `
              <div class="flex justify-between items-center bg-slate-950 p-3 rounded-xl border border-slate-900">
                <div>
                  <h4 class="font-bold text-slate-200 text-xs">${b.court}</h4>
                  <p class="text-[10px] text-slate-400 font-mono mt-0.5">${b.date} | ${b.slot}</p>
                </div>
                ${actionBtn}
              </div>`;
        });
    }

    function toggleUserLogTab(tabKey) {
        activeUserLogTab = tabKey;
        document.getElementById('tabUserLogUpcoming').className = tabKey === 'upcoming' ? 'text-emerald-400 underline decoration-2 underline-offset-4 font-black cursor-pointer' : 'text-slate-500 cursor-pointer';
        document.getElementById('tabUserLogPast').className = tabKey === 'past' ? 'text-emerald-400 underline decoration-2 underline-offset-4 font-black cursor-pointer' : 'text-slate-500 cursor-pointer';
        renderUserPersonalLedgerUI();
    }

    function forceUserSelfRelease(bookingId) {
        if (confirm("Are you sure you want to cancel this slot? Your token will be instantly refunded to your balance pool.")) {
            fetch(BACKEND_WEBAPP_URL, {
                method: 'POST',
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ action: "cancelBooking", bookingId: bookingId, sessionToken: secureUserSessionToken })
            })
            .then(r => r.json()).then(res => {
                if(res.status === "success") {
                    alert("✓ Reservation canceled successfully!");
                    syncUserLogsAndMatrix();
                } else {
                    alert(res.message || "Unable to release session.");
                }
            });
        }
    }

    function commitSecureMemberBooking() {
        if(!selectedTentativeSlotMemory) return alert("Please tap an open schedule cell card to construct a booking target.");
        
        fetch(BACKEND_WEBAPP_URL, {
            method: 'POST',
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                action: "secureBooking",
                courtName: selectedUserAsset,
                sportType: selectedUserAsset.includes('Pickleball') ? 'PICKLEBALL' : 'BADMINTON',
                userName: sessionMemberProfile.full_name,
                date: selectedUserDateStr,
                timeSlot: selectedTentativeSlotMemory,
                sessionToken: secureUserSessionToken
            })
        })
        .then(r => r.json()).then(res => {
            if(res.status === "success") {
                alert("✓ Booking secured successfully!");
                selectedTentativeSlotMemory = "";
                syncUserLogsAndMatrix();
            } else {
                alert(res.message || "An issue occurred processing this transaction entry.");
            }
        });
    }

    function executeLogoutSequence() {
        if(confirm("Confirm logging out of active workspace context?")) {
            if (syncInterval) {
                clearInterval(syncInterval);
                syncInterval = null;
            }

            localStorage.removeItem('chirag_session_token');
            localStorage.removeItem('chirag_member_profile');

            sessionMemberProfile = null; secureUserSessionToken = ""; selectedTentativeSlotMemory = "";
            document.getElementById('loginEmailField').value = ""; document.getElementById('loginPasswordField').value = "";
            toggleInterfaceView('login');
            
            const bannerEl = document.getElementById('pwaGlobalInstallBanner');
            if(bannerEl) bannerEl.classList.remove('hidden');
            initiateSmartPwaBannerSystem();
        }
    }
  </script>
