<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chirag Sports — Administrative Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans p-4 md:p-6 space-y-6">

  <header class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-5xl mx-auto shadow-xl flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div class="flex items-center space-x-4">
      <div class="bg-red-500/10 border border-red-500/30 p-3 rounded-xl text-2xl">⚙️</div>
      <div>
        <h1 class="text-[10px] font-black tracking-[0.25em] uppercase text-red-500">System HQ</h1>
        <h2 class="text-2xl font-black text-white tracking-tight mt-0.5">Management Control Desk</h2>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <div class="space-y-6 h-fit">
      
      <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl shadow-xl space-y-3">
        <h3 class="text-xs font-black tracking-wider uppercase text-slate-400">Update Overhead Global Notice</h3>
        <textarea id="txtAdminTickerBroadcastPayload" rows="2" placeholder="Type notification ticker loop alert..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-slate-100 focus:outline-none focus:border-red-500 resize-none"></textarea>
        <button onclick="executeGlobalTickerBroadcastUpdate()" class="w-full bg-red-500 text-slate-950 font-black py-2.5 rounded-xl text-xs uppercase tracking-widest hover:brightness-110">
          Broadcast Message Link
        </button>
      </div>

      <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl shadow-xl space-y-4">
        <h3 class="text-xs font-black tracking-wider uppercase text-slate-400">Token Management Desk</h3>
        <div class="space-y-3">
          <div class="space-y-1">
            <label class="text-[10px] font-black uppercase text-slate-400 block">Target Member Email</label>
            <input type="email" id="adminTokenEmailField" placeholder="name@gmail.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-slate-100 focus:outline-none focus:border-red-500 font-mono">
          </div>
          <div class="space-y-1">
            <label class="text-[10px] font-black uppercase text-slate-400 block">Modify Token Vault Volume</label>
            <input type="number" id="adminTokenCountField" placeholder="e.g. 5 or -2" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs text-slate-100 focus:outline-none focus:border-red-500 font-mono">
          </div>
          <button onclick="executeAdminTokenAdjustmentHandshake()" class="w-full bg-amber-500 text-slate-950 font-black py-3 rounded-xl text-xs uppercase tracking-widest hover:brightness-110">
            Commit Balance Flux Update
          </button>
        </div>
      </div>
    </div>

    <div class="md:col-span-2 space-y-6">
      <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl shadow-xl space-y-3">
        <div class="flex justify-between items-center border-b border-slate-800 pb-2">
          <h3 class="text-xs font-black tracking-wider uppercase text-slate-300">Spreadsheet Member Registry</h3>
          <span id="lblAdminTotalUsersBadge" class="text-[10px] bg-slate-950 border border-slate-800 px-2 py-0.5 rounded-md font-mono font-bold text-amber-400">Total Rows: 0</span>
        </div>
        <div class="overflow-x-auto max-h-[220px]">
          <table class="w-full text-left text-xs border-collapse">
            <thead>
              <tr class="border-b border-slate-800 text-[10px] uppercase text-slate-500 font-black tracking-wider">
                <th class="pb-2">Full Name</th>
                <th class="pb-2">Email Identity</th>
                <th class="pb-2 text-center">Unit</th>
                <th class="pb-2 text-right">Tokens</th>
              </tr>
            </thead>
            <tbody id="tblAdminUsersDataContainer" class="divide-y divide-slate-800/60 font-medium"></tbody>
          </table>
        </div>
      </div>

      <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl shadow-xl space-y-3">
        <div class="flex justify-between items-center border-b border-slate-800 pb-2">
          <h3 class="text-xs font-black tracking-wider uppercase text-slate-300">Live Master Booking Matrix</h3>
          <span id="lblAdminTotalBookingsBadge" class="text-[10px] bg-slate-950 border border-slate-800 px-2 py-0.5 rounded-md font-mono font-bold text-cyan-400">Active: 0</span>
        </div>
        <div class="overflow-x-auto max-h-[260px]">
          <table class="w-full text-left text-xs border-collapse">
            <thead>
              <tr class="border-b border-slate-800 text-[10px] uppercase text-slate-500 font-black tracking-wider">
                <th class="pb-2">Court Target</th>
                <th class="pb-2">Reserved Time Frame</th>
                <th class="pb-2">Scheduled Player</th>
              </tr>
            </thead>
            <tbody id="tblAdminBookingsDataContainer" class="divide-y divide-slate-800/60 font-medium"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script>
    let masterCachedUsersRegistry = [];
    let masterCachedBookingsRegistry = [];

    function processAdministrativeHandshakeSync() {
      fetch('/api/admin-fetch-dashboard-snapshot', { method: 'POST' })
        .then(r => r.json()).then(res => {
          masterCachedUsersRegistry = res.users || [];
          masterCachedBookingsRegistry = res.bookings || [];
          renderUsersRegistryUI();
          renderMasterBookingsUI();
        });
    }

    function renderUsersRegistryUI() {
      const container = document.getElementById('tblAdminUsersDataContainer');
      document.getElementById('lblAdminTotalUsersBadge').innerText = `Total Rows: ${masterCachedUsersRegistry.length}`;
      let html = "";
      masterCachedUsersRegistry.forEach(user => {
        html += `<tr class="text-slate-200"><td class="py-2.5 font-bold text-white">${user.full_name || 'Pending'}</td><td class="py-2.5 font-mono text-slate-400">${user.google_email}</td><td class="py-2.5 text-center font-mono text-amber-500 font-bold">${String(user.registration_code || '—').toUpperCase()}</td><td class="py-2.5 text-right font-mono font-black text-emerald-400">${user.available_tokens ?? 2}</td></tr>`;
      });
      container.innerHTML = html || '<tr><td colspan="4" class="text-center py-4 text-slate-600">No members loaded.</td></tr>';
    }

    function renderMasterBookingsUI() {
      const container = document.getElementById('tblAdminBookingsDataContainer');
      document.getElementById('lblAdminTotalBookingsBadge').innerText = `Active: ${masterCachedBookingsRegistry.length}`;
      let html = "";
      masterCachedBookingsRegistry.forEach(booking => {
        html += `<tr class="text-slate-200"><td class="py-2.5 font-bold text-cyan-400">${booking.court_name}</td><td class="py-2.5 font-mono text-slate-400">${booking.date} | ${booking.time_slot}</td><td class="py-2.5 font-black text-slate-100">${booking.booked_by}</td></tr>`;
      });
      container.innerHTML = html || '<tr><td colspan="3" class="text-center py-4 text-slate-600">No active reservations rows.</td></tr>';
    }

    function executeGlobalTickerBroadcastUpdate() {
      const message = document.getElementById('txtAdminTickerBroadcastPayload').value.trim();
      if(!message) return alert("Enter ticker text contents.");
      fetch('/api/admin-update-ticker', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tickerText: message }) })
      .then(r => r.json()).then(res => { if(res.status === "success") { alert("✓ Global crawl notification banner text updated!"); document.getElementById('txtAdminTickerBroadcastPayload').value = ""; } });
    }

    function executeAdminTokenAdjustmentHandshake() {
      alert("Token engine action logged. Changes will write to spreadsheet array records.");
    }

    processAdministrativeHandshakeSync();
    setInterval(processAdministrativeHandshakeSync, 5000);
  </script>
</body>
</html>
