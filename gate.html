<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chirag Sports Portal — Entry Gate</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f19] text-slate-200 min-h-screen font-sans flex items-center justify-center p-4">
  <div class="bg-[#111625] p-6 rounded-2xl border border-slate-800/80 shadow-2xl max-w-sm w-full space-y-5">
    <div class="text-center space-y-1.5">
      <div class="inline-flex bg-amber-500/10 border border-amber-500/20 p-3 rounded-2xl text-2xl mb-1 text-amber-400">🛡️</div>
      <h2 class="text-xs font-black tracking-widest uppercase text-amber-400">Security Access Gate</h2>
      <p class="text-base font-black text-slate-100 tracking-tight">Verify Your Member Invitation</p>
      <p class="text-[11px] text-slate-400 font-medium">Please enter your whitelisted Google email to unlock account registration panels.</p>
    </div>
    <div class="space-y-3.5">
      <div class="space-y-1">
        <label class="text-[10px] font-black uppercase text-slate-400 block">Google Email Address</label>
        <input type="email" id="txtGateVerifyEmail" placeholder="yourname@gmail.com" class="w-full bg-[#070a12] border border-slate-800 rounded-xl p-3 text-sm focus:outline-none focus:border-amber-400 text-slate-100 font-mono">
      </div>
      <button onclick="executeGateVerificationCheck()" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-black py-3.5 rounded-xl text-xs uppercase tracking-widest hover:brightness-110 active:scale-[0.99] transition-all cursor-pointer">Verify Invite Clearance</button>
    </div>
    <div class="text-center pt-3 border-t border-slate-800/40 text-xs"><p class="text-slate-500">Already registered? <a href="/index.html" class="text-cyan-400 font-bold hover:underline">Log in here</a></p></div>
  </div>
  <script>
    function executeGateVerificationCheck() {
        const email = document.getElementById('txtGateVerifyEmail').value.toLowerCase().trim();
        if(!email || !email.includes('@')) return alert("Please enter a valid Google email address format.");
        fetch('/api/gate-verify-whitelist', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) })
        .then(r => r.json()).then(res => {
            if (res.status === "success") {
                alert(`✓ Clearance Confirmed! Unit Code: ${res.code}. Opening register form panel fields.`);
                sessionStorage.setItem('gate_verified_email', email);
                sessionStorage.setItem('gate_verified_code', res.code);
                window.location.href = "/index.html?action=register";
            } else { alert(res.message); }
        });
    }
  </script>
</body>
</html>
